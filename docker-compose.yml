name: meeting_assistant

# ─────────────────────────────────────────────────────────────────────────────
#  Technodysis Meeting Assistant — Full GPU Stack
#
#  Services:
#    app       → FastAPI server     http://localhost:8000
#    ollama    → LLM inference      http://localhost:11434
#    postgres  → PostgreSQL 16      localhost:5432
#    redis     → Redis 7 Streams    localhost:6379
#    qdrant    → Vector DB          http://localhost:6333  (gRPC: 6334)
#    minio     → Object storage     http://localhost:9000  (console: 9001)
#
#  Quick start:
#    docker compose up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: meeting_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetuser
      POSTGRES_PASSWORD: meetpass
      POSTGRES_DB: meetingdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetuser -d meetingdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 (Streams + cache + session state) ───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: meeting_redis
    restart: unless-stopped
    command: >
      redis-server
        --appendonly yes
        --appendfsync everysec
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save 60 1000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Qdrant (3-collection hierarchical vector store) ─────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: meeting_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST + Web UI
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || wget -qO- http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 40s

  # ── MinIO (S3-compatible object storage) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: meeting_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Ollama (LLM inference) ───────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: meeting_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ── FastAPI application ──────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODE: full
    container_name: meeting_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      # Infrastructure
      DATABASE_URL:         postgresql+asyncpg://meetuser:meetpass@postgres:5432/meetingdb
      MINIO_ENDPOINT:       http://minio:9000
      OLLAMA_BASE_URL:      http://ollama:11434
      REDIS_URL:            redis://redis:6379/0
      QDRANT_HOST:          qdrant
      QDRANT_PORT:          "6333"
      # Compute
      WHISPER_DEVICE:       cpu
      STT_DEVICE:           cpu
      STT_COMPUTE_TYPE:     float32
      TTS_DEVICE:           cuda
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./data:/app/data
      - whisper_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  minio_data:
  ollama_data:
  whisper_cache:
