# ─────────────────────────────────────────────────────────────────────────────
#  Technodysis Meeting Assistant — Full GPU Stack
#
#  Quick start (Windows PowerShell):
#    .\setup.ps1
#
#  Manual start (after .env is configured):
#    docker compose up --build
#
#  Services:
#    app       → FastAPI server     http://localhost:8000
#    ollama    → LLM inference      http://localhost:11434
#    postgres  → Database           localhost:5432
#    minio     → Object storage     http://localhost:9000  (console: 9001)
# ─────────────────────────────────────────────────────────────────────────────

services:

  postgres:
    image: postgres:16-alpine
    container_name: meeting_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: meetuser
      POSTGRES_PASSWORD: meetpass
      POSTGRES_DB: meetingdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meetuser -d meetingdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: meeting_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: meeting_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MODE: full
    container_name: meeting_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL:       postgresql+asyncpg://meetuser:meetpass@postgres:5432/meetingdb
      MINIO_ENDPOINT:     http://minio:9000
      OLLAMA_BASE_URL:    http://ollama:11434
      WHISPER_DEVICE:     cuda
      STT_DEVICE:         cuda
      STT_COMPUTE_TYPE:   float16
      TTS_DEVICE:         cuda
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./data:/app/data
      - whisper_cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]


volumes:
  postgres_data:
  minio_data:
  ollama_data:
  whisper_cache:
